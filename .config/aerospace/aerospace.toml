# 'main' binding mode declaration
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
# 'main' binding mode must be always presented
[mode.main.binding]

# All possible keys:
# - Letters.        a, b, c, ..., z
# - Numbers.        0, 1, 2, ..., 9
# - Keypad numbers. keypad0, keypad1, keypad2, ..., keypad9
# - F-keys.         f1, f2, ..., f20
# - Special keys.   minus, equal, period, comma, slash, backslash, quote, semicolon, backtick,
#                   leftSquareBracket, rightSquareBracket, space, enter, esc, backspace, tab
# - Keypad special. keypadClear, keypadDecimalMark, keypadDivide, keypadEnter, keypadEqual,
#                   keypadMinus, keypadMultiply, keypadPlus
# - Arrows.         left, down, up, right

# All possible modifiers: cmd, alt, ctrl, shift

# All possible commands: https://nikitabobko.github.io/AeroSpace/commands

# See: https://nikitabobko.github.io/AeroSpace/commands#exec-and-forget
# You can uncomment the following lines to open up terminal with alt + enter shortcut (like in i3)
# alt-enter = '''exec-and-forget osascript -e '
# tell application "Terminal"
#     do script
#     activate
# end tell'
# '''

# Disable default macOS shortcuts
cmd-h = []     # Disable "hide application"
cmd-alt-h = [] # Disable "hide others"

# See: https://nikitabobko.github.io/AeroSpace/commands#focus
cmd-alt-ctrl-shift-m = 'focus left'
cmd-alt-ctrl-shift-n = 'focus down'
cmd-alt-ctrl-shift-e = 'focus up'
cmd-alt-ctrl-shift-i = 'focus right'

# See: https://nikitabobko.github.io/AeroSpace/commands#resize
alt-ctrl-shift-minus = 'resize smart -50'
alt-ctrl-shift-equal = 'resize smart +50'

# See: https://nikitabobko.github.io/AeroSpace/commands#workspace
# cmd-alt-ctrl-shift-1 = 'workspace 1'
# cmd-alt-ctrl-shift-2 = 'workspace 2'
# cmd-alt-ctrl-shift-3 = 'workspace 3'
# cmd-alt-ctrl-shift-4 = 'workspace 4'
# cmd-alt-ctrl-shift-5 = 'workspace 5'
# cmd-alt-ctrl-shift-6 = 'workspace 6'
# cmd-alt-ctrl-shift-7 = 'workspace 7'
# cmd-alt-ctrl-shift-8 = 'workspace 8'
# cmd-alt-ctrl-shift-9 = 'workspace 9'
cmd-alt-ctrl-shift-a = 'workspace A'
# cmd-alt-ctrl-shift-b = 'workspace B'
# cmd-alt-ctrl-shift-c = 'workspace C'
# cmd-alt-ctrl-shift-d = 'workspace D'
# cmd-alt-ctrl-shift-e = 'workspace E'
# cmd-alt-ctrl-shift-f = 'workspace F'
cmd-alt-ctrl-shift-g = 'workspace G'
# cmd-alt-ctrl-shift-i = 'workspace I'
# cmd-alt-ctrl-shift-m = 'workspace M'
# cmd-alt-ctrl-shift-n = 'workspace N'
# cmd-alt-ctrl-shift-o = 'workspace O'
# cmd-alt-ctrl-shift-p = 'workspace P'
# cmd-alt-ctrl-shift-q = 'workspace Q'
cmd-alt-ctrl-shift-r = 'workspace R'
cmd-alt-ctrl-shift-s = 'workspace S'
cmd-alt-ctrl-shift-t = 'workspace T'
# cmd-alt-ctrl-shift-u = 'workspace U'
# cmd-alt-ctrl-shift-v = 'workspace V'
# cmd-alt-ctrl-shift-w = 'workspace W'
# cmd-alt-ctrl-shift-x = 'workspace X'
# cmd-alt-ctrl-shift-y = 'workspace Y'
# cmd-alt-ctrl-shift-z = 'workspace Z'

# See: https://nikitabobko.github.io/AeroSpace/commands#mode
alt-ctrl-shift-space = 'mode aerospace'

# 'aerospace' binding mode declaration.
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
[mode.aerospace.binding]
esc = 'mode main'
alt-ctrl-shift-space = 'mode main'

cmd-r = ['reload-config', 'mode main']
cmd-shift-r = ['flatten-workspace-tree', 'mode main'] # reset layout

# See: https://nikitabobko.github.io/AeroSpace/commands#layout
cmd-a = 'layout accordion horizontal vertical'
cmd-b = 'balance-sizes'
cmd-f = [
  'layout floating tiling',
  'mode main',
] # Toggle between floating and tiling layout
cmd-t = 'layout tiles horizontal vertical'

# See: https://nikitabobko.github.io/AeroSpace/commands#move
m = 'move left'
n = 'move down'
e = 'move up'
i = 'move right'

# See: https://nikitabobko.github.io/AeroSpace/commands#join-with
cmd-m = 'join-with left'
cmd-n = 'join-with down'
cmd-e = 'join-with up'
cmd-i = 'join-with right'

# See: https://nikitabobko.github.io/AeroSpace/commands#workspace-back-and-forth
alt-tab = 'workspace-back-and-forth'

# See: https://nikitabobko.github.io/AeroSpace/commands#move-workspace-to-monitor
alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

#cmd-s = ['layout sticky tiling', 'mode main'] # sticky is not yet supported https://github.com/nikitabobko/AeroSpace/issues/2
backspace = ['close-all-windows-but-current', 'mode main']

